# ── x-* anchors ────────────────────────────────────────────────────────────
# Container stdout/stderr is captured by the Docker daemon's logging driver.
# Without this, the host falls back to whatever dockerd default is set — on
# many distros that is `json-file` with NO size limit, which on a prod VM
# silently grew the mediamtx container's log to 75 GB and filled the
# root filesystem. Pin every service to a bounded json-file rotation.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mock-camera-mediamtx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8554:8554"
      - "8322:8322"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    networks:
      - mock-camera-network
    # Light resource ceiling so a busy RTSP server can't starve the host.
    mem_limit: 512m
    cpus: "1.0"

  mock-camera:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mock-camera-service
    restart: unless-stopped
    logging: *default-logging
    # Generous grace period — cleanup_all parallel-signals all subprocesses,
    # so 30s is plenty for 100+ cameras.
    stop_grace_period: 30s
    depends_on:
      - mediamtx
    ports:
      - "${SERVER_PORT:-9999}:${SERVER_PORT:-9999}"
      - "12000-12999:12000-12999"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - MEDIAMTX_HOST=${MEDIAMTX_HOST:-mediamtx}
      - MEDIAMTX_PORT=${MEDIAMTX_PORT:-8554}
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - SERVER_PORT=${SERVER_PORT:-9999}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - EXTERNAL_IP=${EXTERNAL_IP:-}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-500}
      - WATCHDOG_ENABLED=${WATCHDOG_ENABLED:-true}
      - WATCHDOG_INTERVAL_SECONDS=${WATCHDOG_INTERVAL_SECONDS:-15}
      - ONVIF_DISPATCHER_ENABLED=${ONVIF_DISPATCHER_ENABLED:-false}
      - PYTHONUNBUFFERED=1
    networks:
      - mock-camera-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request,sys; r=urllib.request.urlopen(f'http://localhost:{os.environ.get(\\\"SERVER_PORT\\\",\\\"9999\\\")}/health',timeout=5); sys.exit(0 if r.status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 4g
    cpus: "4.0"

networks:
  mock-camera-network:
    driver: bridge
